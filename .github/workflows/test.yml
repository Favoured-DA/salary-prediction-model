name: Test Salary Prediction Script

on: [push, pull_request]

jobs:
     build:
       runs-on: ubuntu-latest

       steps:
       - name: Checkout repository
         uses: actions/checkout@v6   # Updated to latest stable version

       - name: Set up Python
         uses: actions/setup-python@v5   # Current recommended version
         with:
           python-version: '3.12'

       - name: Install dependencies
         run: |
           python -m pip install --upgrade pip
           pip install -r requirements.txt

       - name: Run the script
         run: python salary_prediction.py
